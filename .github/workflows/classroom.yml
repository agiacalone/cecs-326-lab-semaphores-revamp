name: Create Deliverable Issues

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  create-issues:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Check for existing issues
        id: check
        uses: actions/github-script@v7
        with:
          script: |
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open'
            });
            core.setOutput('skip', existing.data.length > 0 ? 'true' : 'false');

      - name: Create Labels
        if: steps.check.outputs.skip == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            const labels = [
              { name: 'deliverable', color: '0075ca', description: 'Required deliverable' },
            ];
            for (const label of labels) {
              try {
                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  ...label
                });
              } catch (e) { /* already exists, ignore */ }
            }

      - name: Create Issue 1 - Makefile and Stubs
        if: steps.check.outputs.skip == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'Deliverable 1: Makefile and Compilable Stubs — 20 points (6%)',
              labels: ['deliverable'],
              body: [
                '## Makefile and Compilable Stubs — 20 points (6%)',
                '',
                'Your project must compile and run successfully. All four programs (`game`, `barbarian`, `wizard`, `rogue`) must exist and be compilable before any other deliverable can be attempted.',
                '',
                '### Checklist',
                '',
                '- [ ] A `Makefile` exists in the repository root',
                '- [ ] Running `make` compiles all four programs without errors',
                '- [ ] `game`, `barbarian`, `wizard`, and `rogue` executables are produced',
                '- [ ] The correct `dungeon.o` for your architecture has been renamed and included',
                '- [ ] All source files include `dungeon_info.h`',
                '- [ ] All significant code is commented',
                '',
                '### Notes',
                '',
                'An automatic zero applies if there is no Makefile, no commits, or source files are archived or obfuscated.',
                '',
                'Close this issue with a commit once your project compiles cleanly. Reference this issue in your commit message (e.g. `closes #1`).',
              ].join('\n')
            });

      - name: Create Issue 2 - Shared Memory
        if: steps.check.outputs.skip == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'Deliverable 2: Shared Memory — 30 points (8%)',
              labels: ['deliverable'],
              body: [
                '## Shared Memory — 30 points (8%)',
                '',
                'Your `game` process must create and manage a shared memory segment containing the `Dungeon` struct. All other processes must be able to access it.',
                '',
                '### Checklist',
                '',
                '- [ ] Shared memory is created in `game` using `shm_open`, `ftruncate`, and `mmap`',
                '- [ ] The shared memory segment is named correctly as defined in `dungeon_info.h`',
                '- [ ] Only the `Dungeon` struct is stored in shared memory',
                '- [ ] All three character processes can open and map the same shared memory segment',
                '- [ ] Shared memory is cleaned up with `shm_unlink` on exit',
                '- [ ] Modifying a field in one process is reflected in all other processes',
                '',
                '### Notes',
                '',
                'Remember: `shm_open` + `ftruncate` + `mmap` are all required when first creating the segment. Subsequent processes only need `shm_open` + `mmap`.',
                '',
                'Close this issue with a commit once shared memory is working across all processes. Reference this issue in your commit message (e.g. `closes #2`).',
              ].join('\n')
            });

      - name: Create Issue 3 - Signal Handling
        if: steps.check.outputs.skip == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'Deliverable 3: Signal Handling — 20 points (6%)',
              labels: ['deliverable'],
              body: [
                '## Signal Handling — 20 points (6%)',
                '',
                'All three character processes must handle signals without crashing. This includes both `DUNGEON_SIGNAL` and `SEMAPHORE_SIGNAL` as defined in `dungeon_settings.h`.',
                '',
                '### Checklist',
                '',
                '- [ ] All three processes register a signal handler using `sigaction`',
                '- [ ] All three processes handle `DUNGEON_SIGNAL` without crashing',
                '- [ ] All three processes handle `SEMAPHORE_SIGNAL` without crashing',
                '- [ ] Processes remain alive and running until `dungeon->running` becomes false',
                '- [ ] `SA_RESTART` flag is set in your `sigaction` setup',
                '- [ ] No process exits prematurely during normal dungeon operation',
                '',
                '### Notes',
                '',
                'If a process crashes on receiving a signal, check that you have set the `SA_RESTART` flag and that your signal handler is not doing anything unsafe (e.g. calling non-reentrant functions).',
                '',
                'Close this issue with a commit once all processes handle signals correctly. Reference this issue in your commit message (e.g. `closes #3`).',
              ].join('\n')
            });

      - name: Create Issue 4 - Barbarian
        if: steps.check.outputs.skip == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'Deliverable 4: Barbarian Implementation — 10 points (3%)',
              labels: ['deliverable'],
              body: [
                '## Barbarian Implementation — 10 points (3%)',
                '',
                'The Barbarian must correctly respond to `DUNGEON_SIGNAL` by copying the enemy\'s health value into the attack field.',
                '',
                '### Checklist',
                '',
                '- [ ] Barbarian registers a handler for `DUNGEON_SIGNAL`',
                '- [ ] Upon receiving `DUNGEON_SIGNAL`, the Barbarian copies `dungeon->enemy.health` into `dungeon->barbarian.attack`',
                '- [ ] The copy occurs within `SECONDS_TO_ATTACK` seconds',
                '- [ ] Barbarian does not crash or exit prematurely',
                '- [ ] Barbarian exits cleanly when `dungeon->running` becomes false',
                '',
                '### Notes',
                '',
                'This is intentionally the simplest character to implement. Get this working first before moving on to the Wizard or Rogue.',
                '',
                'Close this issue with a commit once the Barbarian is fully functional. Reference this issue in your commit message (e.g. `closes #4`).',
              ].join('\n')
            });

      - name: Create Issue 5 - Wizard
        if: steps.check.outputs.skip == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'Deliverable 5: Wizard Implementation — 10 points (3%)',
              labels: ['deliverable'],
              body: [
                '## Wizard Implementation — 10 points (3%)',
                '',
                'The Wizard must decode a Caesar cipher from the Barrier\'s spell field and copy the decoded message into the Wizard\'s spell field.',
                '',
                '### Checklist',
                '',
                '- [ ] Wizard registers a handler for `DUNGEON_SIGNAL`',
                '- [ ] Upon receiving `DUNGEON_SIGNAL`, the Wizard reads `dungeon->barrier.spell`',
                '- [ ] The first character of `barrier.spell` is used as the Caesar cipher shift key',
                '- [ ] Alphabetical characters are decoded correctly, preserving case',
                '- [ ] Punctuation and spaces are copied as-is without modification',
                '- [ ] Decoded message is copied into `dungeon->wizard.spell` within `SECONDS_TO_GUESS_BARRIER` seconds',
                '- [ ] Wizard does not crash or exit prematurely',
                '- [ ] Wizard exits cleanly when `dungeon->running` becomes false',
                '',
                '### Notes',
                '',
                'If the dungeon prints `_` characters for your spell, you have an invalid character in your output. Check your modulo math and make sure you are handling the wrap-around correctly for both upper and lower case.',
                '',
                'Close this issue with a commit once the Wizard is fully functional. Reference this issue in your commit message (e.g. `closes #5`).',
              ].join('\n')
            });

      - name: Create Issue 6 - Rogue
        if: steps.check.outputs.skip == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'Deliverable 6: Rogue Implementation — 10 points (3%)',
              labels: ['deliverable'],
              body: [
                '## Rogue Implementation — 10 points (3%)',
                '',
                'The Rogue must use a binary search to find the correct lock pick angle within the time limit.',
                '',
                '### Checklist',
                '',
                '- [ ] Rogue registers a handler for `DUNGEON_SIGNAL`',
                '- [ ] Upon receiving `DUNGEON_SIGNAL`, the Rogue begins searching for the correct pick angle',
                '- [ ] A binary search approach is used to converge on the correct value',
                '- [ ] The Rogue reads `dungeon->trap.direction` to determine whether to search higher or lower',
                '- [ ] The Rogue updates `dungeon->rogue.pick` with each new guess',
                '- [ ] The Rogue stops searching when `dungeon->trap.direction` is `-`',
                '- [ ] The correct angle is found within `SECONDS_TO_PICK` seconds',
                '- [ ] Rogue does not crash or exit prematurely',
                '- [ ] Rogue exits cleanly when `dungeon->running` becomes false',
                '',
                '### Notes',
                '',
                'Set `dungeon->rogue.pick` to a new value, then wait for `direction` to change before adjusting again. Setting direction to a sentinel value like `t` after each guess can help you detect when the dungeon has responded.',
                '',
                'Close this issue with a commit once the Rogue is fully functional. Reference this issue in your commit message (e.g. `closes #6`).',
              ].join('\n')
            });

      - name: Create Issue 7 - Semaphores
        if: steps.check.outputs.skip == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'Deliverable 7: Semaphore Implementation — 220 points (61%)',
              labels: ['deliverable'],
              body: [
                '## Semaphore Implementation — 220 points (61%)',
                '',
                'This is the most heavily weighted part of the assignment. Two party members must hold the treasure room door open while the Rogue collects all four treasure characters, then release the semaphores cleanly.',
                '',
                '### Checklist',
                '',
                '- [ ] Named semaphores are created before `RunDungeon` is called, using the names defined in `dungeon_info.h`',
                '- [ ] All three processes register a handler for `SEMAPHORE_SIGNAL`',
                '- [ ] Upon receiving `SEMAPHORE_SIGNAL`, two processes call `sem_wait` on their respective levers',
                '- [ ] The Rogue reads all four characters from `dungeon->treasure` one at a time and copies them into `dungeon->spoils`',
                '- [ ] The treasure field is not null-terminated — your Rogue must handle this correctly',
                '- [ ] Both levers are released (`sem_post`) after the Rogue has finished collecting treasure',
                '- [ ] Semaphores are cleaned up with `sem_close` and `sem_unlink` on exit',
                '- [ ] All four treasure characters are correctly copied into `dungeon->spoils`',
                '',
                '### Notes',
                '',
                'The treasure field reveals one character at a time with a pause between each. Poll or coordinate carefully — do not assume all four characters are available immediately.',
                '',
                'The semaphores must be held down long enough for the Rogue to collect all four characters. Think carefully about how your Wizard and Barbarian will know when it is safe to release. Signals, shared memory polling, and `spoils` field monitoring are all valid approaches.',
                '',
                'Close this issue with a commit once semaphores are fully functional. Reference this issue in your commit message (e.g. `closes #7`).',
              ].join('\n')
            });

      - name: Create Issue 8 - Screenshot
        if: steps.check.outputs.skip == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'Deliverable 8: Screenshot — Required',
              labels: ['deliverable'],
              body: [
                '## Screenshot — Required',
                '',
                'You must provide at least one screenshot of your dungeon running successfully. Screenshots must be committed as individual image files (`*.png` or `*.jpg`) — not embedded inside a document.',
                '',
                '### Checklist',
                '',
                '- [ ] At least one screenshot shows the dungeon running with visible output',
                '- [ ] The screenshot includes at least one `SUCCESS` result',
                '- [ ] Screenshot files are committed individually to the repository',
                '',
                '### Notes',
                '',
                'A screenshot of a full successful run is ideal. If you cannot get a full run, screenshot as much as you have working.',
                '',
                'Close this issue with a commit that includes your screenshot file(s). Reference this issue in your commit message (e.g. `closes #8`).',
              ].join('\n')
            });
